{{ $url := .Get "url"}}
{{ $name := .Get "name"}}

<div class="einrichtung" itemscope itemtype="https://schema.org/LocalBusiness">
    <h2 class="title" itemprop="name">{{- $name -}}</h2>
    {{ .Inner | markdownify }}
    {{- if $url -}}
    <p><a href="{{ $url }}" itemprop="url" target="_blank" rel="noopener">Webseite</a></p>
    {{- end -}}
</div>
